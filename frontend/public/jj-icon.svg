<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cork background circle -->
  <circle cx="32" cy="32" r="30" fill="#5c3d2e"/>
  <circle cx="32" cy="32" r="30" fill="url(#cork)" opacity="0.15"/>

  <!-- Note card / ticket -->
  <rect x="14" y="18" width="36" height="34" rx="2" fill="#faf3e8"
        transform="rotate(-3 32 35)"
        filter="url(#shadow)"/>
  <!-- Subtle lines on the card -->
  <line x1="18" y1="30" x2="46" y2="29" stroke="#e0d4c0" stroke-width="0.8" transform="rotate(-3 32 35)"/>
  <line x1="18" y1="36" x2="42" y2="35" stroke="#e0d4c0" stroke-width="0.8" transform="rotate(-3 32 35)"/>
  <line x1="18" y1="42" x2="38" y2="41" stroke="#e0d4c0" stroke-width="0.8" transform="rotate(-3 32 35)"/>

  <!-- "JJ" text on card -->
  <text x="30" y="28" font-family="serif" font-weight="700" font-size="11"
        fill="#3a2a1a" text-anchor="middle" transform="rotate(-3 32 35)"
        letter-spacing="-0.5">JJ</text>

  <!-- Push pin -->
  <!-- Pin needle (shadow) -->
  <ellipse cx="32" cy="19" rx="3" ry="1" fill="rgba(0,0,0,0.15)" transform="rotate(-3 32 19)"/>
  <!-- Pin body -->
  <circle cx="32" cy="14" r="7" fill="url(#pinGrad)"
          filter="url(#pinShadow)"/>
  <!-- Pin highlight -->
  <circle cx="29.5" cy="11.5" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <!-- Pin base / spike -->
  <polygon points="32,20 30.5,15 33.5,15" fill="#8B4513"/>

  <defs>
    <!-- Cork texture pattern -->
    <filter id="cork">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>

    <!-- Card shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Pin shadow -->
    <filter id="pinShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Pin gradient - warm red -->
    <radialGradient id="pinGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
  </defs>
</svg>